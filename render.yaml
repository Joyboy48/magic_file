databases:
  - name: magic-db
    databaseName: magic
    user: magic
    plan: free

services:
  # --- Managed Redis ---
  - type: redis
    name: magic-redis
    plan: free
    ipAllowList: []

  # --- FastAPI Web Service ---
  - type: web
    name: magic-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: magic-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: magic-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: magic-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: magic-redis
          property: connectionString
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: CORS_ORIGINS
        value: https://magic-file-rosy.vercel.app

  # --- Celery Worker (uses Dockerfile.worker with celery CMD baked in) ---
  - type: worker
    name: magic-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: magic-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: magic-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: magic-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: magic-redis
          property: connectionString
      - key: UPLOAD_DIR
        value: /data/uploads
