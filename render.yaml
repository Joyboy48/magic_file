databases:
  - name: magic-db
    databaseName: magic
    user: magic
    plan: free

services:
  # --- Managed Redis ---
  - type: redis
    name: magic-redis
    plan: free
    ipAllowList: []

  # --- FastAPI Web Service ---
  - type: web
    name: magic-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: magic-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: magic-redis
          property: internalConnectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: magic-redis
          property: internalConnectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: magic-redis
          property: internalConnectionString
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app

  # --- Celery Worker ---
  - type: worker
    name: magic-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    startCommand: celery -A app.worker.celery_app worker --loglevel=INFO --concurrency=1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: magic-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: magic-redis
          property: internalConnectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: magic-redis
          property: internalConnectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: magic-redis
          property: internalConnectionString
      - key: UPLOAD_DIR
        value: /data/uploads
