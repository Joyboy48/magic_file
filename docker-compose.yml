services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-magic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-magic}
      POSTGRES_DB: ${POSTGRES_DB:-magic}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://magic:magic@postgres:5432/magic}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3100,http://localhost:3001,http://localhost:3000}
    depends_on:
      - postgres
      - redis
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/data/uploads

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://magic:magic@postgres:5432/magic}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3100,http://localhost:3001,http://localhost:3000}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - backend_uploads:/data/uploads
    command: celery -A app.worker.celery_app worker --loglevel=INFO --concurrency=1

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    depends_on:
      - backend
    ports:
      - "3100:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  pgdata:
  backend_uploads:

